<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Left. — Coming soon</title>
  <meta name="description" content="Left. — Coming soon.">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --fg: #0a0a0a;
      --muted: #6b7280;
      --accent: #0a84ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --fg: #f5f5f7;
        --muted: #8e8e93;
        --accent: #0a84ff;
      }
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .brand {
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand .dot { color: var(--accent); }

    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid color-mix(in srgb, var(--fg) 12%, transparent);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .coming {
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">Left<span class="dot">.</span></div>
    <div class="spinner" role="status" aria-label="Loading"></div>
    <p class="coming">Coming soon...</p>
  </main>
</body>
</html>
